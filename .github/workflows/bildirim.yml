name: BIST otomatik bildirim

on:
  schedule:
    # Hafta içi 09:45 İstanbul = 06:45 UTC. Saati değiştirmek için cron'u düzenle.
    - cron: '45 6 * * 1-5'
  workflow_dispatch: {}   # GitHub'dan elle de tetiklenebilir

jobs:
  bildir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Kayıtlı kombinleri tara ve Telegram'a yolla
        run: python otomasyon.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
